{% extends "layouts/base.html" %}

{% block content %}
  <main class="bg-primary">
    <section class="min-vh-100 d-flex align-items-center section-image overlay-soft-dark"
             data-background="{{ ASSETS_ROOT }}/img/pages/form-image.jpg">
      <div class="container">
        <div class="row justify-content-center">
          <div class="col-12 d-flex align-items-center justify-content-center">
            <div
                class="signin-inner my-4 my-lg-0 bg-white shadow-soft border rounded border-gray-300 p-4 p-lg-5 w-100 fmxw-500">
              <div class="text-center text-md-center mb-4 mt-md-0">
                <h1 class="mb-0 h3">
                  Task Manager - Login
                </h1>
                <br/>
                {% if form.errors %}
                  <div class="alert alert-danger" role="alert">
                    {% for field, errors in form.errors.items %}
                      {% for error in errors %}
                        {{ error }}
                      {% endfor %}
                    {% endfor %}
                  </div>
                {% endif %}
              </div>
              <form method="post" action="" class="mt-4">
                {% csrf_token %}
                <div class="form-group mb-4">
                  <label for="id_username">Username</label>
                  <div class="input-group">
                    <span class="input-group-text" id="basic-addon1"><span class="fas fa-user"></span></span>
                    {{ form.username }}
                  </div>
                </div>
                <div class="form-group">
                  <div class="form-group mb-4">
                    <label for="id_password">Password</label>
                    <div class="input-group">
                      <span class="input-group-text" id="basic-addon2"><span class="fas fa-unlock-alt"></span></span>
                      {{ form.password }}
                    </div>
                  </div>
                </div>
                <div class="d-grid">
                  <button type="submit" name="login" class="btn btn-primary">Sign in</button>
                </div>
              </form>
            </div>
          </div>
        </div>
      </div>
    </section>
  </main>
{% endblock content %}
