{% extends "base.html" %}
{% load crispy_forms_filters %}

{% block content %}
  <div class="d-flex align-items-center gap-3 mb-2">
    <h2>Projects</h2>
    <a href="{% url 'tasks:project-create' %}" class="btn btn-success">Add</a>
  </div>
  <form method="get" class="d-flex align-items-baseline gap-2">
    {{ search_form|crispy }}
    <input type="submit" value="Search" class="btn btn-outline-primary">
  </form>
  <table class="table table-striped">
    <thead class="table-dark">
    <tr>
      <th scope="col">ID</th>
      <th scope="col">Name</th>
      <th scope="col">Deadline</th>
    </tr>
    </thead>
    <tbody>
    {% for project in project_list %}
      <tr class="{% if project.is_completed %}table-success{% endif %}">
        <th scope="row">{{ project.id }}</th>
        <td><a href="{% url 'tasks:project-detail' project.id %}">{{ project.name }}</a></td>
        <td>{{ project.deadline }}</td>
      </tr>
    {% endfor %}
    </tbody>
  </table>
{% endblock %}
