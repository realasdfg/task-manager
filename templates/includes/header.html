<header
    class="d-flex flex-wrap align-items-center justify-content-center justify-content-md-between py-3 mb-4 border-bottom">
  <div class="fs-4 fw-semibold">
    <a href="{% url 'tasks:index' %}" class="nav-link">Task Manager</a>
  </div>

  <ul class="nav col-12 col-md-auto mb-2 justify-content-center mb-md-0">
    <li><a href="{% url 'tasks:index' %}" class="nav-link px-2 link-dark fw-semibold">Home</a></li>
    <li><a href="{% url 'tasks:project-list' %}" class="nav-link px-2 link-dark fw-semibold">Projects</a></li>
    <li><a href="#" class="nav-link px-2 link-dark fw-semibold">Teams</a></li>
    <li><a href="#" class="nav-link px-2 link-dark fw-semibold">Workers</a></li>
    <li><a href="#" class="nav-link px-2 link-dark fw-semibold">Positions</a></li>
    <li><a href="#" class="nav-link px-2 link-dark fw-semibold">Tasks</a></li>
  </ul>

  <div class="d-flex text-end">
    {% if user.is_authenticated %}
      <form action="{% url 'logout' %}" method="post">
        {% csrf_token %}
        <button class="btn btn-outline-danger me-2" type="submit">Logout</button>
      </form>
    {% else %}
      <a href="{% url 'login' %}?next={{ request.path }}" class="btn btn-outline-primary me-2">Login</a>
    {% endif %}
  </div>
</header>
