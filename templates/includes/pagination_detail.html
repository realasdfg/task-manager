{% load task_tags %}

{% if page.has_other_pages %}
  <nav aria-label="Page navigation">
    <ul class="pagination justify-content-center">
      <li class="page-item {% if not page.has_previous %}disabled{% endif %}">
        <a class="page-link"
           {% if page.has_previous %}href="?{% page_query request page_param 1 %}"{% endif %}>
          <span class="fas fa-angle-double-left"></span>
        </a>
      </li>
      <li class="page-item {% if not page.has_previous %}disabled{% endif %}">
        <a class="page-link"
           {% if page.has_previous %}href="?{% page_query request page_param page.previous_page_number %}"{% endif %}>
          <span class="fas fa-angle-left"></span>
        </a>
      </li>
      {% for num in page.paginator.page_range %}
        {% if num >= page.number|add:"-2" and num <= page.number|add:"2" %}
          {% if num == page.number %}
            <li class="page-item active">
              <span class="page-link">{{ num }}</span>
            </li>
          {% else %}
            <li class="page-item">
              <a class="page-link" href="?{% page_query request page_param num %}">{{ num }}</a>
            </li>
          {% endif %}
        {% endif %}
      {% endfor %}
      <li class="page-item {% if not page.has_next %}disabled{% endif %}">
        <a class="page-link"
           {% if page.has_next %}href="?{% page_query request page_param page.next_page_number %}"{% endif %}>
          <span class="fas fa-angle-right"></span>
        </a>
      </li>
      <li class="page-item {% if not page.has_next %}disabled{% endif %}">
        <a class="page-link"
           {% if page.has_next %}href="?{% page_query request page_param page.paginator.num_pages %}"{% endif %}>
          <span class="fas fa-angle-double-right"></span>
        </a>
      </li>
    </ul>
  </nav>
{% endif %}
