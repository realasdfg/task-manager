<header class="header-global bg-secondary">
  <nav id="navbar-main" aria-label="Primary navigation"
       class="navbar navbar-main navbar-expand-lg navbar-theme-primary headroom navbar-dark">
    <div class="container position-relative">
      <a class="navbar-brand me-lg-5" href="{% url 'tasks:index' %}">
        <img class="navbar-brand-dark" src="{{ ASSETS_ROOT }}/img/logo.png" alt="Logo light">
        <img class="navbar-brand-light" src="{{ ASSETS_ROOT }}/img/logo.png" alt="Logo dark">
      </a>
      <div class="navbar-collapse collapse me-auto" id="navbar_global">
        <ul class="navbar-nav navbar-nav-hover align-items-lg-center">
          <li class="nav-item">
            <a href="{% url 'tasks:index' %}" class="nav-link px-3 link-dark fw-semibold">Home</a>
          </li>
          <li class="nav-item">
            <a href="{% url 'tasks:project-list' %}" class="nav-link px-3 link-dark fw-semibold">Projects</a>
          </li>
          <li class="nav-item">
            <a href="{% url 'tasks:team-list' %}" class="nav-link px-3 link-dark fw-semibold">Teams</a>
          </li>
          <li class="nav-item">
            <a href="{% url 'tasks:worker-list' %}" class="nav-link px-3 link-dark fw-semibold">Workers</a>
          </li>
          <li class="nav-item">
            <a href="{% url 'tasks:position-list' %}" class="nav-link px-3 link-dark fw-semibold">Positions</a>
          </li>
          <li class="nav-item">
            <a href="{% url 'tasks:task-list' %}" class="nav-link px-3 link-dark fw-semibold">Tasks</a>
          </li>
          <li class="nav-item">
            <a href="{% url 'tasks:tasktype-list' %}" class="nav-link px-3 link-dark fw-semibold">Task Types</a>
          </li>
        </ul>
      </div>
      <div class="d-flex align-items-center">
        {% if user.is_authenticated %}
          <a class="btn btn-outline-gray-100 d-none d-lg-inline me-md-3"
             data-toggle="tab"
             href="{% url 'tasks:worker-detail' user.id %}">
            {{ user.username }} <span class="nav-link-icon"><i class="far fa-user"></i></span>
          </a>
          <form action="{% url 'logout' %}" method="post">
            {% csrf_token %}
            <button class="btn btn-outline-gray-100 d-none d-lg-inline me-md-3" type="submit">
              <span class="fas fa-sign-out-alt me-2"></span>
              Logout
            </button>
          </form>
        {% else %}
          <a href="{% url 'login' %}?next={{ request.path }}"
             class="btn btn-outline-gray-100 d-none d-lg-inline me-md-3">
            <span class="fas fa-sign-in-alt me-2"></span>
            Login
          </a>
        {% endif %}
        <button class="navbar-toggler ms-2" type="button" data-bs-toggle="collapse" data-bs-target="#navbar_global"
                aria-controls="navbar_global" aria-expanded="false" aria-label="Toggle navigation">
          <span class="navbar-toggler-icon"></span>
        </button>
      </div>
    </div>
  </nav>
</header>
